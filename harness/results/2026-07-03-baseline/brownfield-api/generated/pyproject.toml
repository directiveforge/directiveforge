[project]
name = "slotharbor"
version = "1.4.0"
description = "Dock-slot scheduling service for Cratewell Logistics inbound carrier appointments"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.115.6",
    "pydantic==2.7.4",
    "sqlalchemy==2.0.31",
    "alembic==1.13.2",
    "uvicorn==0.30.1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["app"]
